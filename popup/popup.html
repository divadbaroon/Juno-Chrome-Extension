<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">


    <title>Juno</title>
    
    <link rel="stylesheet" type="text/css" href="../utils/changeBackground/changeBackground.css">
    <link rel="stylesheet" type="text/css" href="../utils/changeTimeOfDay/changeTimeOfDay.css">
    <link rel="stylesheet" type="text/css" href="../utils/menu/menu.css">
    <link rel="stylesheet" type="text/css" href="../content/search/search_bar/search_bar.css">
    <link rel="stylesheet" type="text/css" href="popup.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">

</head>

<body>
    <!-- Side Navigation Menu -->
    <div id="dropdownMenu" class="dropdown-menu">
        <a href="popup.html">Home</a>
        <a href="../content/profiles/profiles.html">Library</a>
        <a href="../content/extensions/extensions.html">Lab</a>
        <a href="../content/search/search.html">Search</a>
        <a href="../content/settings/settings.html">Settings</a>
    </div>
    
    <div class="main-content">
        <!-- Settings Icon -->
        <div class="settings-container">
            <!-- Settings Button -->
            <button id="settingsButton" class="settings-icon">
                <img src="../images/lines.png" alt="Settings" />
            </button>

        </div>

        <div class="centered-image">
            <img src="../images/junoim.png" alt="Descriptive text">
        </div>

        <button id="toggleHubButton">Get Started</button>

        <div class="hub-container">
            <h1>Customize your entity</h1>
            <div class="inner-container">
                <div class="profile-section">
                    <h2>Profile</h2>
                    <div class="profile-info">
                        <!-- Dynamic content for profile -->
                        <div class="profile-card">
                            <button class="top-left-button"><img src="../../images/profiles/bookmark.png" alt="Icon 1"></button>
                            <button class="top-right-button"><img src="../../images/profiles/add2.png" alt="Icon 2"></button>
                            <img src="../../images/profiles/Scientist4.png" alt="Profile 2">
                            <h3>Charles</h3>
                            <p>Analytical mind, excels in scientific reasoning and problem-solving, ideal for knowledge-seeking conversations.</p>
                        </div>
                    </div>
                </div>
                <div class="extension-section">
                    <h2>Extensions</h2>
                    <div class="extension-search-dropdown">
                        <input type="text" id="searchInput" placeholder="Search...">
                        <div id="dropdownContent" class="dropdown-content"></div>

                        </div>
                        <div class="selected-items">
                            <!-- Selected items will be displayed here -->
                        </div>
                        
                    </div>
                    <div id="selectedExtensions" class="selected-extensions">
                        <!-- Selected extensions will appear here -->
                    </div>
                </div>
                
            </div>
        </div>
        
        <div class="extension-interaction">
            <p>To interact, use the extension:</p>
            <input type="text" id="keyboardShortcut" placeholder="Enter keyboard extension" value="Ctrl + Tab">
        </div>
        
        <!-- Button to change the time of day -->
        <button id="changeTimeOfDay" class="changeTimeOfDay-icon">
            <img src="../images/sun3.png" alt="Settings" />
        </button>

        <!-- Button to change background -->
        <button id="imageButton">
            <img src="../images/magicwand.png"/>
        </button>
    </div>
    
    <script src="../utils/changeBackground/changeBackground.js"></script>
    <script src="../utils/changeTimeOfDay/changeTimeOfDay.js"></script>
    <script src="../utils/menu/menu.js"></script>
    <script src="../content/search/search_bar/search_bar.js"></script>
    <script src="popup.js"></script>
</body>
</html>
